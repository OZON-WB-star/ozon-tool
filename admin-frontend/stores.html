<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大鹅ERP管理后台 - 授权店铺</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"><div class="brand"><div class="brand-mark">DE</div><div><div style="font-size:20px;font-weight:800;">大鹅管理台</div><div class="brand-sub">用户、店铺与数据服务后台</div></div></div><div class="nav-group"><a class="nav-item" href="index.html"><span>后台概览</span><small>Admin</small></a><a class="nav-item active" href="stores.html"><span>授权店铺</span><small>Stores</small></a><a class="nav-item" href="sync.html"><span>同步任务</span><small>Sync</small></a><a class="nav-item" href="users.html"><span>用户管理</span><small>Users</small></a><a class="nav-item" href="../user-frontend/index.html"><span>返回前台</span><small>User</small></a></div></aside>
    <main class="main">
      <div class="shell-topbar inner-shell"><div class="shell-topbar-left"><div class="shell-icon">●</div><div class="shell-icon">→</div><div class="shell-pill">授权店铺总表</div></div><div class="shell-topbar-right"><a class="shell-pill brand" href="data-services.html">数据服务</a></div></div>
      <section class="content">
        <div class="notice-strip" style="margin-bottom:18px;"><span><strong data-runtime-status>当前使用演示数据</strong>，接口地址：<span data-runtime-base>http://127.0.0.1:8010</span></span><a class="muted-link" href="users.html">用户管理</a></div>
        <div class="panel" data-table-root>
          <div class="panel-header"><div class="panel-title"><h3>所有用户的 Ozon 店铺授权</h3><span>后台用于查看授权是否正常、是否需要提醒用户重新生成 API Key。</span></div></div>
          <div class="toolbar"><input type="text" placeholder="搜索用户、店铺、备注" data-table-search><select data-table-filter="auth"><option value="all">全部方式</option><option value="api">Seller API</option></select><select data-table-filter="status"><option value="all">全部状态</option><option value="normal">正常</option><option value="pending">待测试</option><option value="error">异常</option></select></div>
          <table><thead><tr><th>用户ID</th><th>店铺</th><th>站点</th><th>授权方式</th><th>状态</th><th>最近测试</th><th>备注</th></tr></thead><tbody data-render-source="entities.stores" data-render-type="admin-stores" data-empty-cols="7"></tbody></table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/config.js"></script><script src="assets/mock-data.js"></script><script src="assets/api.js"></script><script src="assets/app.js"></script><script src="assets/portal.js"></script>
</body>
</html>
