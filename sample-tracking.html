      <div class="nav-group">

        <div class="nav-section">
          <div class="nav-section-title active"><span>货源</span><span></span></div>
          <div class="nav-sublist">

      <section class="content">
        <div class="module-banner">
          <div><div class="breadcrumb"><span>大鹅ERP</span><span>/</span><span>货源</span><span>/</span><span>样品跟进</span></div><h2>样品页负责把选品变成可判断的商品</h2><p>这里先记录寄样��到样��测试反馈和是否进入草稿6�0池��后续可以继续接图片、视频��质棢�记录和打样成本</p><div class="feature-links"><span class="badge">待寄</span><span class="badge">在</span><span class="badge">已到</span><span class="badge">待评</span></div></div>
          <div class="meta-grid">
            <div class="meta-card"><div class="k">样品</div><div class="v" data-bind="supply.sampleActive" data-bind-countup></div></div>
            <div class="meta-card"><div class="k">本周到样</div><div class="v" data-bind="supply.sampleArrived" data-bind-countup></div></div>

            <div class="meta-card"><div class="k">待复</div><div class="v" data-bind="supply.sampleRetest" data-bind-countup></div></div>
          </div>
        </div>
        <div class="panel" data-table-root>

          <div class="toolbar">
            <input type="text" placeholder="搜索样品、供应商、下丢��? data-table-search>
            <select data-table-filter="status">
              <option value="all">全部状</option>
              <option value="arrived">已到</option>
              <option value="review">待评</option>
              <option value="shipping">在</option>
              <option value="pending">待寄</option>
            </select>
          </div>
          <table>
            <thead><tr><th>样品</th><th>供应</th><th>状</th><th>到样时间</th><th>评估结果</th><th>下一</th></tr></thead>
            <tbody data-render-source="entities.samples" data-render-type="samples" data-empty-cols="6"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/config.js"></script>
  <script src="assets/mock-data.js"></script>
