<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大鹅ERP - 采购链路</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">DE</div><div><div style="font-size:20px;font-weight:800;">大鹅ERP</div><div class="brand-sub">Ozon 选品与运营平</div></div></div>
      <div class="nav-group">
        <a class="nav-item" href="index.html"><span>概览</span><small>Overview</small></a>
        <a class="nav-item" href="orders.html"><span>订单</span><small>Orders</small></a>
        <a class="nav-item" href="product-inventory.html"><span>库存</span><small>Inventory</small></a>
        <div class="nav-section">
          <div class="nav-section-title active"><span>货源</span><span></span></div>
          <div class="nav-sublist">
            <a class="nav-subitem" href="supply.html"><span>货源中心</span></a>
            <a class="nav-subitem" href="sample-tracking.html"><span>样品跟进</span></a>
            <a class="nav-subitem active" href="purchase-flow.html"><span>采购链路</span></a>
          </div>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="shell-topbar inner-shell">
        <div class="shell-topbar-left"><div class="shell-icon"></div><div class="shell-icon"></div><div class="shell-pill">采购链路</div></div>
        <div class="shell-topbar-right"><a class="shell-pill brand" href="orders.html">订单补货入口</a><a class="shell-pill gold" href="product-inventory.html">查看库存预警</a></div>
      </div>
      <section class="content">
        <div class="module-banner">
          <div><div class="breadcrumb"><span>大鹅ERP</span><span>/</span><span>货源</span><span>/</span><span>采购链路</span></div><h2>采购链路把��品、样品和补货串起</h2><p>这里先做采购节点看板，方便以后把样品通过商品直接转成采购计划、补货单和在途跟踪</p><div class="feature-links"><span class="badge">待下</span><span class="badge">已付</span><span class="badge">生产</span><span class="badge">在</span></div></div>
          <div class="meta-grid">
            <div class="meta-card"><div class="k">待下</div><div class="v" data-bind="supply.purchasePending" data-bind-countup></div></div>
            <div class="meta-card"><div class="k">生产</div><div class="v" data-bind="supply.purchaseProduction" data-bind-countup></div></div>
            <div class="meta-card"><div class="k">在��采</div><div class="v" data-bind="supply.purchaseShipping" data-bind-countup></div></div>
            <div class="meta-card"><div class="k">逾期风险</div><div class="v" data-bind="supply.purchaseRisk" data-bind-countup></div></div>
          </div>
        </div>
        <div class="panel" data-table-root>
          <div class="panel-header"><div class="panel-title"><h3>采购进度</h3><span>后面可继续接支付、物流��入仓和质检</span></div></div>
          <div class="toolbar">
            <input type="text" placeholder="搜索采购单��商品池�备�? data-table-search>
            <select data-table-filter="status">
              <option value="all">全部状</option>
              <option value="pending">待下</option>
              <option value="production">生产</option>
              <option value="shipping">在</option>
              <option value="risk">逾期风险</option>
            </select>
          </div>
          <table>
            <thead><tr><th>采购</th><th>商品</th><th>供应</th><th>数量</th><th>状</th><th>预计完成</th><th>备注</th></tr></thead>
            <tbody data-render-source="entities.purchases" data-render-type="purchases" data-empty-cols="7"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/config.js"></script>
  <script src="assets/mock-data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
