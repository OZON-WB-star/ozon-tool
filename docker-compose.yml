services:
  postgres:
    image: postgres:16
    container_name: dae_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dae_erp
      POSTGRES_USER: dae_user
      POSTGRES_PASSWORD: dae_password
    ports:
      - "5432:5432"
    volumes:
      - dae_erp_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: dae_erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  dae_erp_pgdata:
