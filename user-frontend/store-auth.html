<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大鹅ERP - 店铺授权状态</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar"><div class="brand"><div class="brand-mark">DE</div><div><div style="font-size:20px;font-weight:800;">大鹅ERP</div><div class="brand-sub">用户前台 / 授权状态</div></div></div><div class="nav-group"><a class="nav-item" href="index.html"><span>前台首页</span><small>Home</small></a><a class="nav-item active" href="store-auth.html"><span>店铺授权</span><small>Auth</small></a><a class="nav-item" href="connect-store.html"><span>接入店铺</span><small>Connect</small></a><a class="nav-item" href="store-list.html"><span>店铺列表</span><small>Stores</small></a></div></aside>
    <main class="main">
      <div class="shell-topbar inner-shell"><div class="shell-topbar-left"><div class="shell-icon">●</div><div class="shell-icon">→</div><div class="shell-pill">我的 Ozon 授权</div></div><div class="shell-topbar-right"><a class="shell-pill brand" href="connect-store.html">新增授权</a></div></div>
      <section class="content">
        <div class="notice-strip" style="margin-bottom:18px;"><span><strong data-runtime-status>当前使用演示数据</strong>，接口地址：<span data-runtime-base>http://127.0.0.1:8010</span></span></div>
        <div class="panel" data-table-root>
          <div class="panel-header"><div class="panel-title"><h3>店铺授权状态</h3><span>用户只能看到自己绑定的店铺；管理员后台可以看到所有用户的店铺。</span></div></div>
          <div class="toolbar"><input type="text" placeholder="搜索店铺、站点、备注" data-table-search><select data-table-filter="status"><option value="all">全部状态</option><option value="normal">正常</option><option value="pending">待测试</option><option value="error">异常</option></select></div>
          <table><thead><tr><th>店铺</th><th>站点</th><th>授权方式</th><th>状态</th><th>最近测试</th><th>健康分</th><th>说明</th></tr></thead><tbody data-render-source="entities.stores" data-render-type="stores" data-empty-cols="7"></tbody></table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/config.js"></script><script src="assets/mock-data.js"></script><script src="assets/api.js"></script><script src="assets/app.js"></script><script src="assets/portal.js"></script>
</body>
</html>
