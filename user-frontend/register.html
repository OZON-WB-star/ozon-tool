<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>大鹅ERP - 用户注册</title><link rel="stylesheet" href="assets/style.css"></head>
<body><div class="layout-auth"><div class="auth-shell"><section class="auth-hero"><div class="auth-kicker">DAE ERP REGISTER</div><h1>创建前台用户账号</h1><p>注册成功后，用户可以登录前台，绑定自己的 Ozon 店铺。后台管理员可以看到全部用户和店铺。</p></section><section class="auth-card"><h2>注册账号</h2><form class="form-grid" data-register-form><div class="field"><label>姓名/店铺负责人</label><input name="name" type="text" placeholder="例如：王宇波" required></div><div class="field"><label>手机号</label><input name="phone" type="text" placeholder="请输入手机号" required></div><div class="field"><label>邮箱</label><input name="email" type="email" placeholder="请输入邮箱" required></div><div class="field"><label>密码</label><input name="password" type="password" placeholder="至少 6 位" required></div><div class="field"><label>主要用途</label><input name="focus" type="text" value="Ozon 选品与上品" required></div><div class="notice-strip" data-form-message style="display:none;"></div><div class="form-actions"><button class="button primary" type="submit">注册并登录</button><a class="button ghost" href="login.html">已有账号去登录</a></div></form></section></div></div><script src="assets/config.js"></script><script src="assets/api.js"></script><script src="assets/portal.js"></script></body></html>
