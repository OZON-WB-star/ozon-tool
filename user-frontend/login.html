<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>大鹅ERP - 用户登录</title><link rel="stylesheet" href="assets/style.css"></head>
<body><div class="layout-auth"><div class="auth-shell"><section class="auth-hero"><div class="auth-kicker">DAE ERP USER</div><h1>用户前台登录</h1><p>用户登录后管理自己的 Ozon 店铺、商品、订单、选品和利润工具。这里已经连接正式后端 API，不再是纯静态演示。</p><div class="auth-point-grid"><div class="auth-point"><strong>前台用户</strong><span>只能看到自己的店铺和数据。</span></div><div class="auth-point"><strong>真实登录</strong><span>使用数据库账号和 JWT token。</span></div><div class="auth-point"><strong>后续扩展</strong><span>接入 Ozon API 后同步真实商品和订单。</span></div></div></section><section class="auth-card"><h2>用户登录</h2><p>测试账号：demo@example.com / user123456</p><form class="form-grid" data-login-form><div class="field"><label>邮箱或手机号</label><input name="account" type="text" value="demo@example.com" required></div><div class="field"><label>登录密码</label><input name="password" type="password" value="user123456" required></div><div class="notice-strip" data-form-message style="display:none;"></div><div class="form-actions"><button class="button primary" type="submit">登录并进入用户中心</button><a class="button ghost" href="register.html">创建新账号</a><a class="button ghost" href="index.html">返回首页</a></div></form></section></div></div><script src="assets/config.js"></script><script src="assets/api.js"></script><script src="assets/portal.js"></script></body></html>
