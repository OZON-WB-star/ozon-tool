<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大鹅ERP - 注册</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="layout-auth">
    <div class="auth-shell">
      <section class="auth-hero">
        <div class="auth-kicker">DE · 用户注册</div>
        <h1>先把前台用户体系跑</h1>
        <p>注册后会自动调用登录接口并写入演示会话，这样用户可以直接进入自己的工作台，再去接�?Ozon 店铺和使用免费分析模块</p>
        <div class="auth-point-grid">
          <div class="auth-point"><strong>账号创建</strong><span>统一收集联系人��手机��邮箱��主营方向和密码</span></div>
          <div class="auth-point"><strong>默认权益</strong><span>当前默认弢�通免费分析和基础选品能力</span></div>
          <div class="auth-point"><strong>店铺接入</strong><span>注册成功后引导用户立即接�?Ozon 店铺</span></div>
          <div class="auth-point"><strong>后台联动</strong><span>新用户会同步出现在后台用户列表里</span></div>
        </div>
      </section>

      <section class="auth-card">
        <h2>创建账号</h2>
        <p>这一版先做成可用演示链路，后面再接真实数据库、验证码和风控��辑</p>
        <form class="form-grid two" data-register-form>
          <div class="field">
            <label for="register-name">联系</label>
            <input id="register-name" name="name" type="text" placeholder="请输入联系人名称" required>
          </div>
          <div class="field">
            <label for="register-phone">手机</label>
            <input id="register-phone" name="phone" type="text" placeholder="请输入手机号" required>
          </div>
          <div class="field">
            <label for="register-email">邮箱</label>
            <input id="register-email" name="email" type="email" placeholder="请输入邮�? required>
          </div>
          <div class="field">
            <label for="register-focus">主营方向</label>
            <select id="register-focus" name="focus">
              <option value="宠物用品">宠物用品</option>
              <option value="家居收纳">家居收纳</option>
              <option value="户外露营">户外露营</option>
              <option value="美妆收纳">美妆收纳</option>
            </select>
          </div>
          <div class="field">
            <label for="register-password">登录密码</label>
            <input id="register-password" name="password" type="password" placeholder="请设置密�? required>
          </div>
          <div class="field">
            <label for="register-invite">邢�请码 / 来源</label>
            <input id="register-invite" name="invite_code" type="text" placeholder="可��填�?>
          </div>
          <div class="notice-strip" data-form-message style="display:none;grid-column:1 / -1;"></div>
          <div class="form-actions" style="margin-top:18px;grid-column:1 / -1;">
            <button class="button primary" type="submit">注册并进入用户中</button>
            <a class="button ghost" href="login.html">已有账号去登</a>
          </div>
        </form>
      </section>
    </div>
  </div>
  <script src="assets/config.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/portal.js"></script>
</body>
</html>
