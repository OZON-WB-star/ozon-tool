<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大鹅ERP - 订单结构分析</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">DE</div>
        <div>
          <div style="font-size:18px;font-weight:700;">大鹅ERP</div>
          <div class="brand-sub">Ozon 智能运营后台</div>
        </div>
      </div>
      <div class="nav-group">
        <a class="nav-item" href="index.html"><span>概览</span><small>Dashboard</small></a>
        <a class="nav-item" href="orders.html"><span>订单</span><small>Orders</small></a>
        <a class="nav-item active" href="analysis.html"><span>分析</span><span class="free-pill">免费</span></a>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <div class="breadcrumb"><span>大鹅ERP</span><span>/</span><span>分析</span><span>/</span><span>订单结构</span></div>
          <h1 class="page-title">订单结构分析</h1>
        </div>
      </div>
      <section class="content">
        <div class="notice-strip" style="margin-bottom:18px;">
          <span><strong data-runtime-status>当前使用演示数据</strong>，接口地坢��?span data-runtime-base>http://127.0.0.1:8010</span></span>
          <a class="muted-link" href="orders.html">去订单模块处</a>
        </div>
        <div class="hero">
          <div>
            <h2>把订单结构看清楚，发货节奏就会更</h2>
            <p>现在待发货源�运输中、取消单、异常单都来自同丢�套分析接口，后面只要接真数据，就能继续往下扩告警和归因</p>
            <div class="hero-badges">
              <span class="badge">待发</span>
              <span class="badge">运输</span>
              <span class="badge">取消</span>
              <span class="badge">异常</span>
            </div>
          </div>
          <div class="hero-metrics">
            <div class="metric-card"><div class="label">今日订单</div><div class="value" data-bind="orders.today" data-bind-countup></div><div class="up">统一分析入口</div></div>
            <div class="metric-card"><div class="label">待处</div><div class="value" data-bind="orders.pending" data-bind-countup></div><div class="mid">霢�安排波次</div></div>
            <div class="metric-card"><div class="label">异常</div><div class="value" data-bind="orders.exceptions" data-bind-countup></div><div class="down">建议排查</div></div>
            <div class="metric-card"><div class="label">已发</div><div class="value" data-bind="orders.shipped" data-bind-countup></div><div class="up">运输链路稳定</div></div>
          </div>
        </div>

        <div class="panel" data-table-root>
          <div class="panel-header">
            <div class="panel-title">
              <h3>订单结构明细</h3>
              <span>后面可以继续从这里跳回订单列表做实际处理</span>
            </div>
          </div>
          <div class="toolbar">
            <input type="text" placeholder="搜索维度、趋势��建�? data-table-search>
          </div>
          <table>
            <thead>
              <tr>
                <th>维度</th>
                <th>数量</th>
                <th>占比</th>
                <th>趋势</th>
                <th>处理建议</th>
              </tr>
            </thead>
            <tbody data-render-source="entities.analysisOrders" data-render-type="analysis-orders" data-empty-cols="5"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/config.js"></script>
  <script src="assets/mock-data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
